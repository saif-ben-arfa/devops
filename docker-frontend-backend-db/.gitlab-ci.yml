stages:
  - build
  - test
  - deploy

build:
  stage: build
  image: node:14
  script:
    - echo "Building the application..."
    - npm install
    - npm run build
  artifacts:
    paths:
      - build/

test:
  stage: test
  image: node:14
  script:
    - echo "Running tests..."
    - npm test

deploy:
  stage: deploy
  image: kubectl:latest
  script:
    - echo "Deploying to Kubernetes..."
    - kubectl apply -f deployment.yaml
  only:
    - master